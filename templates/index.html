<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/css/style.css">
    <title>Simulador de Investimentos</title>
</head>
<body>
    <div class="container">
        <h1>Simulador de Investimentos</h1>
        <form action="/simular" method="post">
            <div class="campo">
                <label for="investimento_inicial">Valor Inicial (R$):</label>
                <input type="number" id="investimento_inicial" name="investimento_inicial" step="0.01" required>
            </div>
            <div class="campo">
                <label for="contribuicao_mensal">Contribuição Mensal (R$):</label>
                <input type="number" id="contribuicao_mensal" name="contribuicao_mensal " step="0.01" required>
            </div>
            <div class="campo">
                <label for="taxa_juros_mensal">Taxa de Juros Mensal (%):</label>
                <input type="number" id="taxa_juros_mensal" name="taxa_juros_mensal" step="0.01" required>
            </div>
            <div class="campo">
                <label for="duracao_investimento">Duração do Investimento (meses):</label>
                <input type="number" id="duracao_investimento" name="duracao_investimento" required>
            </div>
            <div class="campo">
                <label for="tipo_investimento">Tipo de Investimento:</label>
                <select id="tipo_investimento" name="tipo_investimento" required>
                    <option value="pre">Pré-fixado</option>
                    <option value="pos">Pós-fixado</option>
                    <option value="ipca">IPCA</option>
                    <option value="cdi">CDI</option>
                    <option value="selic">Selic</option>
                    <option value="lci">LCI</option>
                    <option value="lca">LCA</option>
                    <option value="tesouro">Tesouro Direto</option>
                    <option value="fii">FII</option>
                </select><br><br>
            </div>
            <input type="submit" value="Simular">
        </form>
    </div>
<div class="resultados">
    <h2>Resultados da Simulação</h2>
    <p>Valor Final: R$ {{ valor_final }}</p>
    <p>Valor Total Investido: R$ {{ valor_total_investido }}</p>
    <p>Ganho Total: R$ {{ ganho_total }}</p>
</div>
    
</body>
</html>
